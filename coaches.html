<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Utah Flight Coaches</title>
    <meta
      name="description"
      content="Meet the Utah Flight volleyball coaches and staff."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="coaches.css" />
  </head>
  <body>
    <div class="coaches-shell">
      <header class="coaches-topbar">
        <a class="brand" href="index.html#home" aria-label="Utah Flight home">
          <img src="assets/media/utah-flight-2026-logo.png" alt="Utah Flight logo" />
          <div>
            <p class="eyebrow">Utah Flight</p>
            <p class="brand-name">Coaches</p>
          </div>
        </a>
        <nav class="coaches-nav">
          <a href="index.html">Main Site</a>
          <a href="recruiting.html">Recruiting</a>
          <a href="index.html#contact">Contact</a>
        </nav>
      </header>

      <main>
        <section class="coaches-hero">
          <div class="container coaches-hero-grid">
            <div>
              <p class="kicker">Coaches And Staff</p>
              <h1>Meet The People Behind Utah Flight.</h1>
              <p>
                Utah Flight coaches and staff are focused on competitive growth, player development, and a positive club culture.
              </p>
            </div>
            <div class="coach-feature">
              <img src="assets/media/Utah Flight 2025 Mountain Peak tournament champs.JPEG" alt="Utah Flight team celebration" />
            </div>
          </div>
        </section>

        <section class="section">
          <div class="container">
            <div class="section-heading">
              <p class="kicker">Staff Directory</p>
              <h2>Coaches</h2>
            </div>
            <div id="coach-grid" class="coach-grid"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="coaches.js"></script>
  </body>
</html>
