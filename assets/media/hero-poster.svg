<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Utah Flight hero poster placeholder</title>
  <desc id="desc">Abstract sports poster placeholder for the Utah Flight website.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#091324" />
      <stop offset="50%" stop-color="#142643" />
      <stop offset="100%" stop-color="#08111f" />
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f05a28" stop-opacity=".9" />
      <stop offset="100%" stop-color="#ffb487" stop-opacity=".1" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="1320" cy="150" r="260" fill="url(#glow)" opacity=".7" />
  <circle cx="330" cy="760" r="240" fill="#f05a28" opacity=".18" />
  <path d="M100 780 L760 180 L1520 360" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-width="18" />
  <path d="M120 850 L810 240 L1550 420" fill="none" stroke="#f05a28" stroke-opacity=".4" stroke-width="10" />
  <text x="110" y="360" fill="#f5f7fb" font-family="Barlow Condensed, Arial, sans-serif" font-size="160" font-weight="700">UTAH</text>
  <text x="110" y="500" fill="#f5f7fb" font-family="Barlow Condensed, Arial, sans-serif" font-size="160" font-weight="700">FLIGHT</text>
  <text x="115" y="585" fill="#ffb487" font-family="Inter, Arial, sans-serif" font-size="34" letter-spacing="7">REPLACE WITH TEAM PHOTO OR VIDEO POSTER</text>
</svg>
